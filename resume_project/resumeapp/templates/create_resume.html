{% extends 'base.html' %}

{% block content %}
<div class="card shadow p-4">
    <h2 class="mb-4 text-center">Create Resume</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="text-center">
            <button type="submit" class="btn btn-primary">
                Generate Resume
            </button>
        </div>
    </form>
</div>
{% endblock %}
