{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
<div class="col-md-6">

<div class="card shadow-sm p-4">

<h4 class="mb-4">Create Tweet</h4>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Text</label>
{{ form.text }}
</div>

<div class="mb-3">
<label class="form-label">Photo</label>
{{ form.photo }}
</div>

<button type="submit" class="btn btn-primary">
Post Tweet
</button>

<a href="{% url 'tweet_list' %}" class="btn btn-secondary ms-2">
Cancel
</a>

</form>

</div>
</div>
</div>

{% endblock %}
