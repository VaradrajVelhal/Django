{% extends "layout.html" %}
{% block title %}
tweets
{% endblock  %}

{% block content %}
<h1 class="text-center mt-4">Welcome to django project</h1>
<h2>{% if form.instace.pk %}
    Edit Tweet
    {% else %}
    Create Tweet
    {% endif %}
    <form method="POST" enctype = "multipart/form-data" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">Submit</button>
    </form>
    <a href="{% url 'tweet_list' %}">Back to tweet list</a>
</h2>


{%endblock%}
