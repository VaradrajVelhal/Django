{% extends "layout.html" %} 
{% block title %} chai Page {% endblock %}
 {% block content %}
<h1>chai aur code | chai Page</h1>
<div class="grid grid-cols-3 gap-4 m-4">
    {% for chai in chais %}
    <div class= "bg-blue-500 p-4 rounded text-center">
        <img class="rounded" src="{{chai.image.url}}" alt="">
        <h3 class="2xl font-bold">{{chai.name}}</h3>
        <a href="{% url 'chai_detail' chai.id %}">
            <button class="bg-green-500 text-white w-[100%] px-4 py-2 rounded mt-2">
                {{chai.type}} - {{chai.id}}
            </button>
        </a>
    </div>
    {% endfor %}
</div>
    {% endblock %}
