{% extends "layout.html" %}
{% block content %}
test content for forms
<form method="POST">
    {% csrf_token %}
    {{form.as_p}}
    <button type="submit" class="bg-amber-900 text-amber-200">Search Store</button>
</form>

{% if stores %}
<h2>Stores Available</h2>
<ul>
    {% for store in stores  %}
    <li>{{store.name}} - {{store.location}}</li>
    {% endfor %}
</ul>
{% endif %}
{% endblock %}
